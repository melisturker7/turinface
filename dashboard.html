<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Archive Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #555;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        canvas {
            width: 100% !important;
            height: 300px !important;
        }
        @media (max-width: 600px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Flood Events Dashboard</h1>
        <p style="text-align: center; color: #666;">Visualizing global flood data from 1985 to present.</p>
        
        <div class="dashboard-grid">
            <!-- Card 1: Events by Country -->
            <div class="card">
                <h2>Top 20 Countries by Flood Events</h2>
                <canvas id="countryChart"></canvas>
            </div>

            <!-- Card 2: Events per Year -->
            <div class="card">
                <h2>Flood Events per Year</h2>
                <canvas id="yearChart"></canvas>
            </div>

            <!-- Card 3: Events by Category -->
            <div class="card">
                <h2>Events by Main Cause</h2>
                <canvas id="categoryChart"></canvas>
            </div>

            <!-- Card 4: Displaced by Severity -->
            <div class="card">
                <h2>Total Displaced by Severity</h2>
                <canvas id="severityChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const csvFilePath = 'data/floodarchive.csv';

        Papa.parse(csvFilePath, {
            download: true,
            header: true,
            dynamicTyping: true,
            complete: function(results) {
                const data = results.data.filter(row => row.Country && row.Began);
                processData(data);
            }
        });

        function processData(data) {
            // 1. Bar chart: Flood events by country (top 20)
            const countryCounts = {};
            data.forEach(row => {
                countryCounts[row.Country] = (countryCounts[row.Country] || 0) + 1;
            });
            const topCountries = Object.entries(countryCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 20);
            
            createBarChart('countryChart', 
                topCountries.map(x => x[0]), 
                topCountries.map(x => x[1]), 
                'Number of Events', '#3498db');

            // 2. Line chart: Flood events per year
            const yearCounts = {};
            data.forEach(row => {
                const year = row.Began.split('-')[0];
                if (year) yearCounts[year] = (yearCounts[year] || 0) + 1;
            });
            const sortedYears = Object.keys(yearCounts).sort();
            
            createLineChart('yearChart', 
                sortedYears, 
                sortedYears.map(y => yearCounts[y]), 
                'Events per Year', '#e67e22');

            // 3. Bar chart: Events by category (MainCause)
            const causeCounts = {};
            data.forEach(row => {
                let cause = row.MainCause ? row.MainCause.trim() : 'Unknown';
                // Simple normalization
                cause = cause.toLowerCase().replace(/^\w/, c => c.toUpperCase());
                causeCounts[cause] = (causeCounts[cause] || 0) + 1;
            });
            const topCauses = Object.entries(causeCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            createBarChart('categoryChart', 
                topCauses.map(x => x[0]), 
                topCauses.map(x => x[1]), 
                'Number of Events', '#2ecc71');

            // 4. Bar chart: Total displaced by Severity
            const severityDisplaced = {};
            data.forEach(row => {
                const sev = row.Severity || 'Unknown';
                const disp = parseFloat(row.Displaced) || 0;
                severityDisplaced[sev] = (severityDisplaced[sev] || 0) + disp;
            });
            const sortedSeverities = Object.keys(severityDisplaced).sort();

            createBarChart('severityChart', 
                sortedSeverities, 
                sortedSeverities.map(s => severityDisplaced[s]), 
                'Total People Displaced', '#e74c3c');
        }

        function createBarChart(canvasId, labels, data, label, color) {
            new Chart(document.getElementById(canvasId), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        backgroundColor: color,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function createLineChart(canvasId, labels, data, label, color) {
            new Chart(document.getElementById(canvasId), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        borderColor: color,
                        backgroundColor: color + '33',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }
    </script>
</body>
</html>
