<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istanbul Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }
        #map {
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([41.0082, 28.9784], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        const landmarks = [
            { name: "Hagia Sophia", pos: [41.0085, 28.9802] },
            { name: "Blue Mosque", pos: [41.0054, 28.9768] },
            { name: "Topkapi Palace", pos: [41.0115, 28.9833] },
            { name: "Galata Tower", pos: [41.0256, 28.9741] },
            { name: "Grand Bazaar", pos: [41.0106, 28.9682] }
        ];

        landmarks.forEach(landmark => {
            L.marker(landmark.pos)
                .bindPopup(landmark.name)
                .addTo(map);
        });
    </script>
</body>
</html>
