<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Flood Map</title>
    <!-- Use HTTPS explicitly for Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        body, html { margin: 0; padding: 0; font-family: sans-serif; background: #f0f0f0; }
        #map { height: 600px; width: 100%; background: #e5e3df; border-bottom: 2px solid #ccc; }
        #status {
            padding: 15px; background: white; border-bottom: 1px solid #ddd;
            font-weight: bold; color: #333; text-align: center;
        }
    </style>
</head>
<body>

    <div id="status">Global Historical Flood Map (Archive 1985-2024)</div>
    <div id="map"></div>

    <!-- Use HTTPS explicitly for Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        try {
            // Initialize map
            const map = L.map('map').setView([20, 0], 2);

            // Use HTTPS OpenStreetMap Tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            // Flood Data from the Archive
            const floods = [
                { name: "Flood: Pakistan (2022)", pos: [30.3, 69.3], desc: "Historic monsoon floods affecting millions." },
                { name: "Flood: Germany (2021)", pos: [50.5, 6.9], desc: "Ahr Valley floods - extreme rainfall event." },
                { name: "Flood: China (2020)", pos: [30.5, 114.3], desc: "Severe Yangtze River basin floods." },
                { name: "Flood: USA (2018)", pos: [43.0, -89.4], desc: "Historic flooding in Madison, WI." },
                { name: "Flood: Brazil (2024)", pos: [-30.0, -51.2], desc: "Record floods in Rio Grande do Sul." },
                { name: "Flood: Greece (2023)", pos: [39.3, 22.2], desc: "Storm Daniel - unprecedented rainfall." },
                { name: "Flood: Afghanistan (2024)", pos: [34.4, 70.4], desc: "Flash flooding due to heavy spring rains." }
            ];

            // Add Flood Markers (Red Circles)
            floods.forEach(f => {
                L.circleMarker(f.pos, { 
                    color: 'red', 
                    fillColor: '#f03', 
                    fillOpacity: 0.5, 
                    radius: 10 
                })
                .addTo(map)
                .bindPopup(`<b>${f.name}</b><br>${f.desc}`);
            });

            // Add Istanbul Landmark for reference (Blue Marker)
            L.marker([41.0082, 28.9784])
                .addTo(map)
                .bindPopup("<b>Istanbul, Turkey</b><br>Reference Location");

            console.log("Map Loaded Successfully!");

        } catch (error) {
            document.body.prepend("ERROR LOADING MAP: " + error.message);
            console.error(error);
        }
    </script>
</body>
</html>
