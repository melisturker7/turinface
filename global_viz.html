<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Flood Visualization - GeoViz</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --cr-green: #8DC63F;
            --cr-dark-blue: #0B3E73;
            --cr-dark-green: #10502F;
            --cr-red: #B22025;
            --cr-light-blue: #00A7ED;
            --cr-yellow: #FFC500;
            --cr-orange: #E55825;
            --background: #0a1628;
            --foreground: #f0f4f8;
            --card: #0f2240;
            --border: #1e4976;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--background);
            color: var(--foreground);
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        header {
            background: var(--card);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        header h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--cr-green);
        }

        .stats {
            display: flex;
            gap: 1.5rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--cr-light-blue);
        }

        .stat-label {
            font-size: 0.75rem;
            color: #8ba4c0;
            text-transform: uppercase;
        }

        #map {
            flex-grow: 1;
            background: var(--cr-dark-blue);
        }

        .legend {
            background: var(--card);
            padding: 0.75rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            font-size: 0.75rem;
        }

        .legend-title {
            color: #8ba4c0;
            font-weight: 600;
            text-transform: uppercase;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 22, 40, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--cr-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Leaflet Overrides */
        .leaflet-popup-content-wrapper {
            background: var(--card);
            color: var(--foreground);
            border-radius: 8px;
        }
        .leaflet-popup-tip {
            background: var(--card);
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <p>Loading Global Flood Data...</p>
    </div>

    <div class="container">
        <header>
            <div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <h1>GeoViz: Global Flood Archive</h1>
                    <a href="index.html" style="font-size: 11px; color: var(--cr-light-blue); text-decoration: none; border: 1px solid var(--cr-light-blue); padding: 2px 6px; border-radius: 4px;">Local View</a>
                </div>
                <p style="font-size: 0.7rem; color: #8ba4c0; margin: 2px 0 0 0;">Historical flood events (1985-Present)</p>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div id="stat-events" class="stat-value">0</div>
                    <div class="stat-label">Events</div>
                </div>
                <div id="stat-displaced-container" class="stat-item">
                    <div id="stat-displaced" class="stat-value">0M</div>
                    <div class="stat-label">Displaced</div>
                </div>
            </div>
        </header>

        <div id="map"></div>

        <div class="legend">
            <span class="legend-title">Severity:</span>
            <div class="legend-item"><span class="dot" style="background: var(--cr-green);"></span> Low (≤1)</div>
            <div class="legend-item"><span class="dot" style="background: var(--cr-yellow);"></span> Medium (1-1.5)</div>
            <div class="legend-item"><span class="dot" style="background: var(--cr-red);"></span> High (>1.5)</div>
            <span style="margin-left: auto; color: #8ba4c0;">Marker size proportional to displaced population</span>
        </div>
    </div>

    <script>
        const map = L.map('map', { 
            attributionControl: false,
            zoomControl: false 
        }).setView([20, 0], 2);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        L.control.attribution({ prefix: false, position: 'bottomright' })
          .addAttribution('&copy; <a href="https://stadiamaps.com/">Stadia Maps</a>')
          .addTo(map);

        function getSeverityColor(severity) {
            if (severity <= 1) return '#8DC63F';
            if (severity <= 1.5) return '#FFC500';
            return '#B22025';
        }

        function getMarkerRadius(displaced, maxDisplaced) {
            const minRadius = 4;
            const maxRadius = 30;
            if (!displaced || maxDisplaced === 0) return minRadius;
            return minRadius + (Math.sqrt(displaced) / Math.sqrt(maxDisplaced)) * (maxRadius - minRadius);
        }

        const csvFilePath = 'data/floodarchive.csv';

        Papa.parse(csvFilePath, {
            download: true,
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data.filter(row => {
                    const lat = row.anonymous_lat !== undefined ? row.anonymous_lat : (row.lat !== undefined ? row.lat : row.Latitude);
                    const lng = row.anonymous_long !== undefined ? row.anonymous_long : (row.long !== undefined ? row.long : (row.lng !== undefined ? row.lng : row.Longitude));
                    return lat !== undefined && lng !== undefined && !isNaN(lat) && !isNaN(lng);
                });

                processData(data);
                document.getElementById('loading').style.display = 'none';
            },
            error: function(err) {
                console.error("Error loading CSV:", err);
                document.getElementById('loading').innerHTML = '<p style="color: var(--cr-red);">Error loading data. Please check data/floodarchive.csv</p>';
            }
        });

        function processData(data) {
            let totalDisplaced = 0;
            const maxDisplaced = Math.max(...data.map(d => d.Displaced || 0), 1);

            data.forEach(point => {
                const lat = point.anonymous_lat !== undefined ? point.anonymous_lat : (point.lat !== undefined ? point.lat : point.Latitude);
                const lng = point.anonymous_long !== undefined ? point.anonymous_long : (point.long !== undefined ? point.long : (point.lng !== undefined ? point.lng : point.Longitude));
                const displaced = point.Displaced || 0;
                const severity = point.Severity || 1;
                totalDisplaced += displaced;

                const color = getSeverityColor(severity);
                const radius = getMarkerRadius(displaced, maxDisplaced);

                const popupContent = `
                    <div style="min-width: 200px;">
                        <h3 style="margin: 0 0 8px 0; font-size: 14px; font-weight: 600; color: var(--cr-green);">${point.Country || "Unknown"}</h3>
                        <div style="font-size: 12px; line-height: 1.6;">
                            ${point.MainCause ? `<div><strong>Cause:</strong> ${point.MainCause}</div>` : ""}
                            ${point.Dead ? `<div><strong>Deaths:</strong> ${point.Dead.toLocaleString()}</div>` : ""}
                            ${point.Displaced ? `<div><strong>Displaced:</strong> ${point.Displaced.toLocaleString()}</div>` : ""}
                            <div><strong>Severity:</strong> ${severity}</div>
                            ${point.Began ? `<div><strong>Began:</strong> ${point.Began}</div>` : ""}
                        </div>
                    </div>
                `;

                L.circleMarker([lat, lng], {
                    radius: radius,
                    fillColor: color,
                    color: '#0B3E73',
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.7
                }).addTo(map).bindPopup(popupContent);
            });

            document.getElementById('stat-events').innerText = data.length.toLocaleString();
            document.getElementById('stat-displaced').innerText = (totalDisplaced / 1000000).toFixed(1) + 'M';
        }
    </script>
</body>
</html>
